<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>双色球开奖分布图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #999; }
:root {
  --bg-dark: #f0f2f5;
  --bg-mid: #ffffff;
  --bg-light: #e8eaf0;
  --fg-primary: #1a1a2e;
  --fg-secondary: #5a5a7a;
  --accent: #e94560;
  --accent-hover: #ff6b81;
  --green: #2ed573;
  --gold: #f0a500;
  --card-bg: #ffffff;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.12);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --zone1: #e94560; --zone2: #ff6348; --zone3: #ffa502; --zone4: #1e90ff;
}
body {
  font-family: "Microsoft YaHei UI", "Segoe UI", sans-serif;
  background: var(--bg-dark);
  color: var(--fg-primary);
  min-height: 100vh;
}
.top-bar {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 4px 20px rgba(165, 10, 10, 0.3);
}
.top-bar h1 {
  font-size: 22px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 1px;
}
.top-bar .sub { font-size: 13px; color: rgba(255,255,255,.7); margin-top: 2px; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

.data-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.data-bar button {
  border: none;
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  box-shadow: var(--shadow-sm);
}
.btn-fetch {
  background: linear-gradient(135deg, #e94560, #c62828);
  color: #fff;
}
.btn-fetch:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.btn-download {
  background: linear-gradient(135deg, #1e90ff, #0d47a1);
  color: #fff;
}
.btn-download:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.data-status { font-size: 13px; color: var(--fg-secondary); }
.data-status.ok { color: var(--green); font-weight: 600; }

.period-selector {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--card-bg);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
  font-size: 13px;
  color: var(--fg-primary);
}
.period-input {
  width: 72px;
  padding: 5px 8px;
  border: 1px solid #d0d0d0;
  border-radius: 6px;
  font-size: 13px;
  text-align: center;
  outline: none;
  background: var(--bg-dark);
  color: var(--fg-primary);
  transition: border-color .2s;
}
.period-input:focus { border-color: var(--accent); }
.period-input::placeholder { color: #aaa; font-size: 11px; }
.btn-period-apply {
  border: none;
  padding: 6px 18px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: linear-gradient(135deg, #1e90ff, #0d47a1);
  color: #fff;
  transition: all .2s;
  box-shadow: var(--shadow-sm);
}
.btn-period-apply:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.period-hint { font-size: 12px; color: var(--fg-secondary); }
.period-hint.error { color: var(--accent); font-weight: 600; }

.latest-draw {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-md);
  border: 1px solid rgba(0,0,0,.04);
}
.latest-draw h3 {
  font-size: 15px;
  color: var(--fg-secondary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.latest-draw h3 .title-bar {
  display: inline-block;
  width: 4px;
  height: 16px;
  background: var(--accent);
  border-radius: 2px;
}
.latest-draw .draw-info {
  display: flex;
  gap: 20px;
  margin-bottom: 14px;
  font-size: 14px;
  color: var(--fg-secondary);
  flex-wrap: wrap;
}
.latest-draw .draw-info strong { color: var(--fg-primary); }
.latest-draw .balls-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.draw-ball {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  box-shadow: 0 4px 12px rgba(233,69,96,.35);
  animation: popIn .4s cubic-bezier(.68,-.55,.27,1.55);
}
.draw-ball.red { background: linear-gradient(135deg, #ff4444, #e02020); }
.draw-ball.blue { background: linear-gradient(135deg, #4488ff, #2255dd); box-shadow: 0 4px 12px rgba(34,85,221,.35); }
.draw-divider { width: 2px; height: 44px; background: #ddd; margin: 0 4px; }
@keyframes popIn {
  0% { transform: scale(0) rotate(-45deg); opacity: 0; }
  70% { transform: scale(1.15) rotate(5deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.dist-container { overflow-x: auto; max-height: 70vh; overflow-y: auto; }
.dist-main {
  display: flex;
  gap: 0;
  min-width: max-content;
  border: 1px solid #d0d0d0;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
}
.dist-period-col {
  flex-shrink: 0;
  background: #fff;
  padding: 0;
}
.dist-stat-col {
  flex-shrink: 0;
  background: #fff;
  padding: 0;
  border-right: 2px solid #2196f3;
}
.dist-zones-row {
  display: flex;
  gap: 0;
}
.dist-zone-col {
  flex-shrink: 0;
  background: #fff;
  padding: 0;
  border-right: 2px solid #2196f3;
}
.dist-zone-col:last-child { border-right: none; }
.dist-table {
  border-collapse: collapse;
  font-size: 10px;
  border: 1px solid #d0d0d0;
}
.dist-table th {
  background: #e3f2fd;
  padding: 2px 1px;
  text-align: center;
  font-weight: 600;
  font-size: 9px;
  white-space: nowrap;
  min-width: 16px;
  border: 1px solid #d0d0d0;
  color: #333;
}
.dist-table td {
  padding: 0;
  text-align: center;
  border: 1px solid #d0d0d0;
  height: 18px;
  width: 16px;
  min-width: 16px;
  position: relative;
}
.dist-ball {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  font-size: 8px;
  font-weight: 700;
  color: #fff;
  background: #e53935;
  box-shadow: 0 1px 3px rgba(229,57,53,.35);
}
.dist-ball.blue-ball {
  background: #1e88e5;
  box-shadow: 0 1px 3px rgba(30,136,229,.35);
}
.dist-miss {
  font-size: 8px;
  color: #1565c0;
  font-weight: 600;
}
.dist-table .hit { background: rgba(229,57,53,.08); }
.dist-table .hit-blue { background: rgba(30,136,229,.08); }
.dist-stat-ball {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  font-size: 8px;
  font-weight: 700;
  color: #fff;
  background: #2196f3;
  box-shadow: 0 1px 3px rgba(33,150,243,.35);
}
.dist-stat-num {
  font-size: 8px;
  color: #999;
  font-weight: 600;
}
.dist-zone-col, .dist-period-col, .dist-stat-col {
  display: flex;
  flex-direction: column;
}
.zone-stat {
  display: grid;
  grid-template-columns: repeat(var(--cols), 1fr);
  gap: 0;
  padding: 4px 2px;
  border-top: 1px solid #d0d0d0;
  background: linear-gradient(to top, #e8f5e9, #f1f8e9);
  flex-shrink: 0;
}
.zone-stat-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  height: 55px;
  min-width: 16px;
  border: 1px solid #d0d0d0;
}
.zone-stat-count {
  font-size: 9px;
  font-weight: 700;
  color: #333;
  margin-bottom: 2px;
  line-height: 1;
}
.zone-stat-bar {
  width: 10px;
  min-height: 2px;
  background: linear-gradient(to top, #43a047, #66bb6a);
  border-radius: 2px 2px 0 0;
  transition: height 0.3s ease;
  box-shadow: 0 -1px 4px rgba(67,160,71,.3);
}
.dist-footer-label {
  height: 55px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  color: #333;
  background: linear-gradient(to top, #e8f5e9, #f1f8e9);
  border-top: 1px solid #d0d0d0;
  padding: 4px 2px;
  flex-shrink: 0;
}
.dist-footer-placeholder {
  height: 55px;
  background: linear-gradient(to top, #e8f5e9, #f1f8e9);
  border-top: 1px solid #d0d0d0;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <h1>双色球开奖分布图</h1>
    <div class="sub">33选6+16选1 · 传统3区分布 · 走势分析</div>
  </div>
</div>

<div class="container">
  <div class="data-bar">
    <button class="btn-fetch" onclick="fetchData()">获取最新开奖数据</button>
    <button class="btn-download" onclick="downloadDataTxt()">下载TXT</button>
    <span class="data-status" id="dataStatus">未加载数据</span>
  </div>

  <div class="period-selector">
    <span>最近</span>
    <input type="number" id="recentN" value="30" min="1" max="100" class="period-input" placeholder="期数">
    <span>期</span>
    <button class="btn-period-apply" onclick="applyPeriod()">查看</button>
    <span class="period-hint" id="periodHint"></span>
  </div>

  <div id="latestDraw" class="latest-draw" style="display:none;">
    <h3><span class="title-bar"></span>最新开奖</h3>
    <div class="draw-info" id="drawInfo"></div>
    <div class="balls-row" id="drawBalls"></div>
  </div>

  <div class="dist-container" id="distContainer"></div>
</div>

<script>
var drawData = [];

var RED_ZONES = [
  { id: 1, label: '第一区', range: [1, 11],  color: '#e94560' },
  { id: 2, label: '第二区', range: [12, 22], color: '#ff6348' },
  { id: 3, label: '第三区', range: [23, 33], color: '#ffa502' }
];

var BLUE_ZONE = { id: 4, label: '蓝球区', range: [1, 16], color: '#1e90ff' };

function getRedZoneCounts(redNums) {
  return RED_ZONES.map(function(z) {
    return redNums.filter(function(n) { return n >= z.range[0] && n <= z.range[1]; }).length;
  });
}

var RED_KEYS = ['one','two','three','four','five','six'];
var BLUE_KEYS = ['seven'];

function parseItemNums(item) {
  var reds = RED_KEYS.map(function(k) { return parseInt(item[k]); }).filter(function(n) { return !isNaN(n) && n >= 1 && n <= 33; }).sort(function(a, b) { return a - b; });
  var blues = BLUE_KEYS.map(function(k) { return parseInt(item[k]); }).filter(function(n) { return !isNaN(n) && n >= 1 && n <= 16; });
  if (reds.length < 6) {
    var numsStr = item.number || item.nums || item.haoma || '';
    var parts = String(numsStr).split('+');
    reds = parts[0] ? parts[0].split(/[,，\s]+/).map(Number).filter(function(n) { return !isNaN(n) && n >= 1 && n <= 33; }).sort(function(a, b) { return a - b; }) : reds;
    blues = parts[1] ? parts[1].split(/[,，\s]+/).map(Number).filter(function(n) { return !isNaN(n) && n >= 1 && n <= 16; }) : blues;
  }
  return { reds: reds, blues: blues };
}

function downloadDataTxt() {
  if (drawData.length === 0) {
    alert('暂无数据，请先获取最新开奖数据');
    return;
  }
  var data = drawData.slice().reverse();
  var lines = [];
  lines.push('双色球开奖数据');
  lines.push('期号\t日期\t红球\t蓝球\t区比');
  data.forEach(function(item) {
    lines.push(
      item.period + '\t' +
      item.date + '\t' +
      item.reds.map(function(n) { return String(n).padStart(2, '0'); }).join(' ') + '\t' +
      item.blues.map(function(n) { return String(n).padStart(2, '0'); }).join(' ') + '\t' +
      item.zoneCounts.join(':')
    );
  });
  var blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  var link = document.createElement('a');
  link.download = '双色球开奖数据.txt';
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

function fetchData(limit) {
  limit = limit || parseInt(document.getElementById('recentN').value) || 30;
  if (limit < 1) limit = 1;
  if (limit > 100) limit = 100;
  document.getElementById('recentN').value = limit;

  var statusEl = document.getElementById('dataStatus');
  statusEl.textContent = '正在获取最新开奖数据...';
  statusEl.className = 'data-status';

  var url = 'http://api.huiniao.top/interface/home/lotteryHistory?type=ssq&page=1&limit=' + limit;

  fetch(url)
    .then(function(res) { return res.json(); })
    .then(function(json) {
      if (json.code !== 1 && json.code !== 200 && json.code !== 0) {
        throw new Error(json.info || '接口返回异常');
      }

      var dataObj = json.data || {};
      var lastInfo = dataObj.last || null;
      var listData = dataObj.data || dataObj;
      var list = listData.list || listData;

      if (!Array.isArray(list) || list.length === 0) {
        throw new Error('返回数据为空');
      }

      var results = [];
      list.forEach(function(item) {
        var period = String(item.code || item.qihao || item.issue || '');
        var date = String(item.day || item.date || item.open_time || '');
        var parsed = parseItemNums(item);

        if (parsed.reds.length < 6 || !period) return;

        results.push({
          period: period,
          date: date,
          reds: parsed.reds,
          blues: parsed.blues,
          zoneCounts: getRedZoneCounts(parsed.reds)
        });
      });

      if (lastInfo) {
        var lastPeriod = String(lastInfo.code || lastInfo.qihao || '');
        var lastParsed = parseItemNums(lastInfo);
        if (lastPeriod && lastParsed.reds.length >= 6) {
          var alreadyHas = results.some(function(r) { return r.period === lastPeriod; });
          if (!alreadyHas) {
            results.unshift({
              period: lastPeriod,
              date: String(lastInfo.day || lastInfo.date || lastInfo.open_time || ''),
              reds: lastParsed.reds,
              blues: lastParsed.blues,
              zoneCounts: getRedZoneCounts(lastParsed.reds)
            });
          }
        }
      }

      if (results.length === 0) throw new Error('有效数据不足');

      results.sort(function(a, b) {
        var pa = a.period.replace(/\D/g, '');
        var pb = b.period.replace(/\D/g, '');
        return pb.localeCompare(pa);
      });

      drawData = results;
      statusEl.textContent = '已加载 ' + drawData.length + ' 期数据';
      statusEl.className = 'data-status ok';

      renderLatestDraw();
      buildDistribution();
    })
    .catch(function(err) {
      statusEl.textContent = '获取失败: ' + (err.message || '请稍后重试');
      statusEl.className = 'data-status';
    });
}

function applyPeriod() {
  var hintEl = document.getElementById('periodHint');
  hintEl.textContent = '';
  hintEl.className = 'period-hint';

  var n = parseInt(document.getElementById('recentN').value) || 30;
  if (n < 1 || n > 100) {
    hintEl.textContent = '期数请填1-100';
    hintEl.className = 'period-hint error';
    return;
  }

  fetchData(n);
}

function renderLatestDraw() {
  if (drawData.length === 0) return;
  var item = drawData[0];
  var el = document.getElementById('latestDraw');
  el.style.display = '';

  document.getElementById('drawInfo').innerHTML =
    '<span>期数: <strong>' + item.period + '</strong></span>' +
    '<span>日期: <strong>' + item.date + '</strong></span>' +
    '<span>红球区比: <strong>' + item.zoneCounts.join(':') + '</strong></span>';

  var ballsHtml = '';
  item.reds.forEach(function(n) {
    ballsHtml += '<div class="draw-ball red">' + String(n).padStart(2, '0') + '</div>';
  });
  ballsHtml += '<div class="draw-divider"></div>';
  item.blues.forEach(function(n) {
    ballsHtml += '<div class="draw-ball blue">' + String(n).padStart(2, '0') + '</div>';
  });
  document.getElementById('drawBalls').innerHTML = ballsHtml;
}

function buildDistribution() {
  var container = document.getElementById('distContainer');
  container.innerHTML = '';
  if (drawData.length === 0) return;

  var dataSlice = drawData.slice().reverse();

  var redMissings = {};
  for (var n = 1; n <= 33; n++) {
    redMissings[n] = [];
    for (var i = 0; i < dataSlice.length; i++) {
      if (dataSlice[i].reds.indexOf(n) !== -1) {
        redMissings[n][i] = 0;
      } else {
        var found = false;
        for (var j = i + 1; j < dataSlice.length; j++) {
          if (dataSlice[j].reds.indexOf(n) !== -1) {
            redMissings[n][i] = j - i;
            found = true;
            break;
          }
        }
        redMissings[n][i] = found ? redMissings[n][i] : dataSlice.length - i;
      }
    }
  }

  var blueMissings = {};
  for (var n = 1; n <= 16; n++) {
    blueMissings[n] = [];
    for (var i = 0; i < dataSlice.length; i++) {
      if (dataSlice[i].blues.indexOf(n) !== -1) {
        blueMissings[n][i] = 0;
      } else {
        var found = false;
        for (var j = i + 1; j < dataSlice.length; j++) {
          if (dataSlice[j].blues.indexOf(n) !== -1) {
            blueMissings[n][i] = j - i;
            found = true;
            break;
          }
        }
        blueMissings[n][i] = found ? blueMissings[n][i] : dataSlice.length - i;
      }
    }
  }

  var redCounts = {};
  for (var n = 1; n <= 33; n++) {
    redCounts[n] = dataSlice.filter(function(d) { return d.reds.indexOf(n) !== -1; }).length;
  }
  var blueCounts = {};
  for (var n = 1; n <= 16; n++) {
    blueCounts[n] = dataSlice.filter(function(d) { return d.blues.indexOf(n) !== -1; }).length;
  }

  var main = document.createElement('div');
  main.className = 'dist-main';

  var periodDiv = document.createElement('div');
  periodDiv.className = 'dist-period-col';
  var periodTbody = '';
  dataSlice.forEach(function(d, i) {
    periodTbody += '<tr>' +
      '<td style="color:#999;font-size:8px;">' + (i + 1) + '</td>' +
      '<td style="font-family:Consolas,monospace;font-size:8px;color:#333;">' + d.period.slice(-4) + '</td>' +
    '</tr>';
  });
  periodDiv.innerHTML =
    '<table class="dist-table">' +
      '<thead><tr><th style="width:16px;">序</th><th style="width:42px;">期号</th></tr><tr><th colspan="2" style="height:18px;"></th></tr></thead>' +
      '<tbody>' + periodTbody + '</tbody>' +
    '</table>' +
    '<div class="dist-footer-label">出现次数</div>';
  main.appendChild(periodDiv);

  var statDiv = document.createElement('div');
  statDiv.className = 'dist-stat-col';
  var statTbody = '';
  dataSlice.forEach(function(d) {
    var rowHtml = '';
    d.zoneCounts.forEach(function(c) {
      if (c >= 3) {
        rowHtml += '<td><span class="dist-stat-ball">' + c + '</span></td>';
      } else {
        rowHtml += '<td><span class="dist-stat-num">' + c + '</span></td>';
      }
    });
    var blueCount = d.blues.length;
    if (blueCount >= 1) {
      rowHtml += '<td><span class="dist-stat-ball" style="background:#1e88e5;">' + blueCount + '</span></td>';
    } else {
      rowHtml += '<td><span class="dist-stat-num">' + blueCount + '</span></td>';
    }
    statTbody += '<tr>' + rowHtml + '</tr>';
  });
  statDiv.innerHTML =
    '<table class="dist-table">' +
      '<thead>' +
        '<tr><th colspan="4" style="color:#e53935;font-size:10px;">分区统计</th></tr>' +
        '<tr>' +
          '<th style="color:#e94560;">一区</th>' +
          '<th style="color:#ff6348;">二区</th>' +
          '<th style="color:#ffa502;">三区</th>' +
          '<th style="color:#1e90ff;">蓝球</th>' +
        '</tr>' +
      '</thead>' +
      '<tbody>' + statTbody + '</tbody>' +
    '</table>' +
    '<div class="dist-footer-placeholder"></div>';
  main.appendChild(statDiv);

  var zonesDiv = document.createElement('div');
  zonesDiv.className = 'dist-zones-row';

  RED_ZONES.forEach(function(zone) {
    var zoneDiv = document.createElement('div');
    zoneDiv.className = 'dist-zone-col';

    var nums = [];
    for (var n = zone.range[0]; n <= zone.range[1]; n++) nums.push(n);
    var ballCount = nums.length;

    var tbodyHtml = '';
    dataSlice.forEach(function(d, rowIdx) {
      var rowHtml = '';
      nums.forEach(function(n) {
        if (d.reds.indexOf(n) !== -1) {
          rowHtml += '<td class="hit"><span class="dist-ball">' + String(n).padStart(2, '0') + '</span></td>';
        } else {
          var miss = redMissings[n][rowIdx];
          rowHtml += '<td><span class="dist-miss">' + miss + '</span></td>';
        }
      });
      tbodyHtml += '<tr>' + rowHtml + '</tr>';
    });

    var zoneMaxCount = Math.max.apply(null, nums.map(function(n) { return redCounts[n]; }));
    var statHtml = nums.map(function(n) {
      var count = redCounts[n];
      var barHeight = zoneMaxCount > 0 ? Math.max(2, Math.round((count / zoneMaxCount) * 35)) : 0;
      return '<div class="zone-stat-cell">' +
        '<div class="zone-stat-count">' + count + '</div>' +
        '<div class="zone-stat-bar" style="height:' + barHeight + 'px;"></div>' +
      '</div>';
    }).join('');

    zoneDiv.innerHTML =
      '<table class="dist-table">' +
        '<thead>' +
          '<tr><th colspan="' + ballCount + '" style="color:' + zone.color + ';font-size:10px;">' +
            String(zone.range[0]).padStart(2, '0') + '-' + String(zone.range[1]).padStart(2, '0') + '区分布</th></tr>' +
          '<tr>' + nums.map(function(n) { return '<th>' + String(n).padStart(2, '0') + '</th>'; }).join('') + '</tr>' +
        '</thead>' +
        '<tbody>' + tbodyHtml + '</tbody>' +
      '</table>' +
      '<div class="zone-stat" style="--cols:' + ballCount + ';">' + statHtml + '</div>';
    zonesDiv.appendChild(zoneDiv);
  });

  var blueZoneDiv = document.createElement('div');
  blueZoneDiv.className = 'dist-zone-col';

  var blueNums = [];
  for (var n = BLUE_ZONE.range[0]; n <= BLUE_ZONE.range[1]; n++) blueNums.push(n);

  var blueTbodyHtml = '';
  dataSlice.forEach(function(d, rowIdx) {
    var rowHtml = '';
    blueNums.forEach(function(n) {
      if (d.blues.indexOf(n) !== -1) {
        rowHtml += '<td class="hit-blue"><span class="dist-ball blue-ball">' + String(n).padStart(2, '0') + '</span></td>';
      } else {
        var miss = blueMissings[n][rowIdx];
        rowHtml += '<td><span class="dist-miss">' + miss + '</span></td>';
      }
    });
    blueTbodyHtml += '<tr>' + rowHtml + '</tr>';
  });

  var blueMaxCount = Math.max.apply(null, blueNums.map(function(n) { return blueCounts[n]; }));
  var blueStatHtml = blueNums.map(function(n) {
    var count = blueCounts[n];
    var barHeight = blueMaxCount > 0 ? Math.max(2, Math.round((count / blueMaxCount) * 35)) : 0;
    return '<div class="zone-stat-cell">' +
      '<div class="zone-stat-count">' + count + '</div>' +
      '<div class="zone-stat-bar" style="height:' + barHeight + 'px;background:linear-gradient(to top,#1e88e5,#42a5f5);box-shadow:0 -1px 4px rgba(30,136,229,.3);"></div>' +
    '</div>';
  }).join('');

  blueZoneDiv.innerHTML =
    '<table class="dist-table">' +
      '<thead>' +
        '<tr><th colspan="16" style="color:' + BLUE_ZONE.color + ';font-size:10px;">蓝球01-16分布</th></tr>' +
        '<tr>' + blueNums.map(function(n) { return '<th>' + String(n).padStart(2, '0') + '</th>'; }).join('') + '</tr>' +
      '</thead>' +
      '<tbody>' + blueTbodyHtml + '</tbody>' +
    '</table>' +
    '<div class="zone-stat" style="--cols:16;">' + blueStatHtml + '</div>';
  zonesDiv.appendChild(blueZoneDiv);

  main.appendChild(zonesDiv);
  container.appendChild(main);
}

fetchData();
</script>
</body>
</html>
